function diagnose(input) {
  const lower = input.toLowerCase();
  let scores = { BODY: 0, MIND: 0, PURSE: 0, HEART: 0 };
  let matched = {};

  for (const [domain, data] of Object.entries(DOMAINS)) {
    for (const kw of data.keywords) {
      // Use word boundary regex — prevents "sore" matching inside "resource"
      if (kwRegex(kw).test(lower)) {
        // Multi-word phrases are more specific = higher confidence
        const pts = kw.includes(" ") ? 5 : 2;
        scores[domain] += pts;
        if (!matched[domain]) matched[domain] = [];
        matched[domain].push(kw);
      }
    }
  }

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][1] > 0 ? sorted[0][0] : "PURSE";
  const domainData = DOMAINS[primary];

  let useSecondary = false;
  if (domainData.secondaryTriggers) {
    for (const t of domainData.secondaryTriggers) {
      if (kwRegex(t).test(lower)) { useSecondary = true; break; }
    }
  }

  const river = useSecondary ? domainData.secondaryRiver : domainData.primaryRiver;

  return {
    domain: primary,
    domainLabel: domainData.label,
    river,
    riverData: RIVERS[river],
    matchedKeywords: matched[primary] || [],
    input
  };
}

      })
    });

    if (!response.ok) {
      const errText = await response.text();
      console.error("Treat endpoint error:", response.status, errText);
      throw new Error(`API error ${response.status}: ${errText}`);
    }

    const data = await response.json();
    console.log("API response data keys:", Object.keys(data));
    if (data.error) {
      console.error("API returned error:", data.error, data.details || "");
      throw new Error(`API error: ${data.error}`);
    }

    const text = data.content?.map(item => item.type === "text" ? item.text : "").filter(Boolean).join("\n") || "";
    console.log("Extracted text length:", text.length, "first 100:", text.slice(0, 100));

    if (!text) throw new Error("Empty response");

    // Strip any markdown formatting the model might still include
    const cleanText = text.replace(/\*\*/g, "").replace(/^#+\s*/gm, "");

    // Robust section parser — handles varied formatting from the API
    function extractSection(fullText, sectionName, allNames) {
      // Build pattern: section header followed by content, terminated by next section or end
      // Allow colon with or without newline, with or without markdown bold/asterisks
      const escapedName = sectionName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const otherNames = allNames.filter(n => n !== sectionName).map(n => n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
      const stopPattern = otherNames.length > 0 ? `(?=\\n\\s*(?:\\*\\*)?(?:${otherNames.join("|")})(?:\\*\\*)?\\s*:)` : "";
      const regex = new RegExp(`(?:\\*\\*)?${escapedName}(?:\\*\\*)?\\s*:\\s*([\\s\\S]*?)(?:${stopPattern}|$)`, "i");
      const match = fullText.match(regex);
      return match ? match[1].trim().replace(/^\*\*|\*\*$/g, "").trim() : "";
    }

    const sectionNames = ["ERROR ANALYSIS", "ROOT CLAIM", "THE TRUTH", "TREATMENT", "WATCH", "THE SCIENTIFIC NOW"];
    const sections = {};
    for (const name of sectionNames) {
      sections[name] = extractSection(cleanText, name, sectionNames);
    }

    // If parsing got nothing useful, use the full text as the treatment
    const hasContent = sections["ERROR ANALYSIS"] || sections["TREATMENT"] || sections["THE TRUTH"];

    if (!hasContent) {
      return {
        errorAnalysis: "",
        rootClaim: "",
        theTruth: "",
        treatment: text, // Use the entire raw response as the treatment
        watch: "",
        scientificNow: "",
        full: text,
        isAPI: true
      };

      rootClaim: sections["ROOT CLAIM"],
      theTruth: sections["THE TRUTH"],
      treatment: sections["TREATMENT"],
      watch: sections["WATCH"],
      scientificNow: sections["THE SCIENTIFIC NOW"] || "",
      full: text,
      isAPI: true
    };
  } catch (err) {
    console.error("generateTreatmentAPI failed:", err.message || err);
    // Fallback to basic template if API fails

  }
}

function BreathingTimer({ onComplete }) {
  const [phase, setPhase] = useState("ready");
  const [breathCount, setBreathCount] = useState(0);
  const [seconds, setSeconds] = useState(0);
  const [breathPhase, setBreathPhase] = useState("in");
  const timerRef = useRef(null);

  const startBreathing = () => {
    setPhase("breathing");
    setBreathCount(0);
    setBreathPhase("in");
    setSeconds(4);
  };

  useEffect(() => {
    if (phase !== "breathing") return;
    timerRef.current = setInterval(() => {
      setSeconds(prev => {
        if (prev <= 1) {
          setBreathPhase(bp => {
            if (bp === "in") return "hold";
            if (bp === "hold") return "out";
            if (bp === "out") {
              setBreathCount(bc => {
                if (bc >= 2) {
                  clearInterval(timerRef.current);
                  setPhase("done");
                  return bc;
                }
                return bc + 1;
              });
              return "in";
            }
            return "in";
          });
          return breathPhase === "out" ? 6 : breathPhase === "hold" ? 4 : 4;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase, breathPhase]);

  const labels = { in: "Breathe In", hold: "Hold", out: "Release" };
  const durations = { in: 4, hold: 4, out: 6 };

  if (phase === "ready") return (
    <button onClick={startBreathing} style={styles.breathBtn}>Begin 3 Breaths</button>
  );
  if (phase === "done") return (
    <div style={{ textAlign: "center" }}>
      <p style={styles.breathLabel}>Peace.</p>
      <button onClick={onComplete} style={styles.breathBtn}>Continue</button>
    </div>
  );

  const progress = 1 - (seconds / durations[breathPhase]);

  return (
    <div style={{ textAlign: "center" }}>
      <div style={styles.breathCircleOuter}>
        <div style={{
          ...styles.breathCircleInner,
          transform: `scale(${0.5 + progress * 0.5})`,
          opacity: 0.4 + progress * 0.6
        }} />
      </div>
      <p style={styles.breathLabel}>{labels[breathPhase]}</p>
      <p style={styles.breathSeconds}>{seconds}</p>
      <p style={{ ...styles.dimText, marginTop: 8 }}>Breath {breathCount + 1} of 3</p>
    </div>
  );
}

async function hashPassword(pw) {
  const data = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

                {retroMode ? "Treating Back In Time" : "Treat Back In Time"}
              </button>

              {/* Retroactive When Field */}
              {retroMode && (
                <div style={styles.retroField}>
                  <p style={styles.retroLabel}>When did this occur?</p>
                  <input
                    type="text"
                    style={styles.retroInput}
                    value={retroWhen}
                    onChange={e => setRetroWhen(e.target.value)}
                    placeholder="e.g., in 2022, three years ago, when I was 25..."
                  />
                  <div style={styles.retroScripture}>
                    <p style={styles.retroVerse}>"Before Abraham was, I am"</p>
                    <p style={styles.retroAttr}>— Christ Jesus</p>
                  </div>
                </div>
              )}

              <button
                onClick={handleTreat}
                style={{
                  ...styles.treatBtn,
                  opacity: input.trim() && (!retroMode || retroWhen.trim()) ? 1 : 0.3,
                  cursor: input.trim() && (!retroMode || retroWhen.trim()) ? "pointer" : "default"
                }}
                disabled={!input.trim() || (retroMode && !retroWhen.trim())}
              >
                {retroMode ? "Treat at Origin" : "Treat"}
              </button>
            </div>
            <div style={styles.navRow}>
              <button onClick={() => setShowJournal(true)} style={styles.navBtn}>Journal{journal.length > 0 ? ` (${journal.length})` : ''}</button>
              <button onClick={() => setShowAbout(true)} style={styles.navBtn}>About</button>
              <a href="https://www.zeffy.com/en-US/organizations/kingley-foundation" target="_blank" rel="noopener noreferrer" style={{ ...styles.navBtn, ...styles.giveBtn, textDecoration: 'none', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>Give</a>
              <button onClick={() => setShowSettings(true)} style={styles.navBtn}>Notifications</button>
            </div>
            <div style={{ textAlign: 'center', marginTop: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: storageStatus === 'synced' ? '#5a6b4a' : storageStatus === 'error' ? '#8a4a4a' : '#6a6050' }} />
              <span style={{ fontSize: 11, color: '#6a6050', letterSpacing: 1 }}>
                {storageStatus === 'synced' ? 'Journal saved to device' : storageStatus === 'error' ? 'Storage unavailable' : 'Connecting...'}
              </span>
            </div>
          </div>
        )}

        {/* ── DIAGNOSIS PHASE ── */}
        {phase === "DIAGNOSIS" && diagnosis && (
          <div style={wrapperStyle}>
            <div style={styles.phaseHeader}>
              <p style={styles.phaseLabel}>Phase 1 — Diagnosis</p>
              <p style={styles.phaseSub}>Name the Error</p>
            </div>
            <div style={styles.diagnosisBox}>
              <p style={styles.diagDomain}>{diagnosis.domainLabel}</p>
              <p style={styles.diagFloor}>Floor 1 · Hell · The domain of depravity and unreality</p>
              <div style={styles.diagRiver}>
                <p style={styles.riverName}>River: {diagnosis.riverData.name}</p>
                <p style={styles.riverSub}>{diagnosis.riverData.subtitle}</p>
                <p style={styles.riverMeta}>{diagnosis.riverData.column} · {diagnosis.riverData.direction}</p>
              </div>
            </div>
            <p style={styles.diagExplain}>
              Every error lives on the lowest floor of consciousness — no matter how real it appears. It has no foundation in Principle. The treatment begins by seeing it for what it is: a lie with no floor beneath it.
            </p>
            {retroMode && (
              <div style={styles.retroBadgeBox}>
                <span style={styles.retroBadgeIcon}>⟲</span>
                <span style={styles.retroBadgeText}>Retroactive Treatment · {retroWhen}</span>
              </div>
            )}
            <button onClick={() => retroMode ? setPhase("SCIENTIFIC_NOW") : setPhase("ANCHOR")} style={styles.continueBtn}>
              {retroMode ? "Continue to the Scientific Now →" : "Continue to Universal Truth →"}
            </button>
          </div>
        )}

        {/* ── SCIENTIFIC NOW PHASE (Retroactive Only) ── */}
        {phase === "SCIENTIFIC_NOW" && retroMode && (
          <div style={wrapperStyle}>
            <div style={styles.phaseHeader}>
              <p style={styles.phaseLabel}>The Scientific "Now"</p>
              <p style={styles.phaseSub}>Treatment at the Point of Origin</p>
            </div>
            <div style={styles.retroBadgeBox}>
              <span style={styles.retroBadgeIcon}>⟲</span>
              <span style={styles.retroBadgeText}>Treating at: {retroWhen}</span>
            </div>
            <div style={{ ...styles.anchorBox, marginBottom: 20, borderColor: '#3a3020' }}>
              <p style={{ ...styles.anchorPara, fontSize: 15, color: '#c4a35a', fontStyle: 'italic', marginTop: 0 }}>
                "Before Abraham was, I am"
              </p>
              <p style={{ ...styles.anchorPara, fontSize: 13, color: '#8a7a60', marginTop: 4 }}>— Christ Jesus (John 8:58)</p>
              <p style={{ ...styles.anchorPara, fontSize: 15, color: '#c4a35a', fontStyle: 'italic' }}>
                "And it shall come to pass, that before they call, I will answer"
              </p>
              <p style={{ ...styles.anchorPara, fontSize: 13, color: '#8a7a60', marginTop: 4 }}>— Isaiah 65:24</p>
              <p style={{ ...styles.anchorPara, fontSize: 15, color: '#c4a35a', fontStyle: 'italic' }}>
                "That which hath been is now; and that which is to be hath already been"
              </p>
              <p style={{ ...styles.anchorPara, fontSize: 13, color: '#8a7a60', marginTop: 4 }}>— Ecclesiastes 3:15</p>
            </div>
            <div style={{ ...styles.anchorBox, marginBottom: 24 }}>
              <p style={{ ...styles.anchorPara, fontSize: 17 }}>
                What mortals call "time" is merely limited human perception — not a law, not a cause, not a power. The entire material picture is akin to cinema-like images — lines of force projected in the ether of mortal belief. These images have no fixed reality.
              </p>
              <p style={{ ...styles.anchorPara, fontSize: 17 }}>
                If time is unreal, then treatment is as efficacious applied to what mortals call "the past" as to "the present." The error that appeared {retroWhen} never had legitimate cause, law, or power — not then, not now, not at any point in the so-called timeline.
              </p>
              <p style={{ ...styles.anchorPara, fontSize: 17 }}>
                You are now treating at the point of origin. The "bridge of coincidence" — the chain of mortal beliefs that linked one error to the next, that built the seeming narrative of cause and effect from that moment to this one — is itself a lie. You dissolve it at its root. The entire chain collapses, because it never had a foundation in Principle.
              </p>
              <p style={{ ...styles.anchorPara, fontSize: 17 }}>
                This is not imagination. This is not positive thinking applied to memory. This is scientific treatment operating outside the illusion of time, because Principle is omnipresent — it does not operate within a timeline. It is the ever-present I AM.
              </p>
            </div>
            <button onClick={() => setPhase("ANCHOR")} style={styles.continueBtn}>Continue to Universal Truth →</button>
          </div>
        )}

        {/* ── ANCHOR PHASE ── */}
        {phase === "ANCHOR" && diagnosis && (
          <div style={wrapperStyle}>
            <div style={styles.phaseHeader}>
              <p style={styles.phaseLabel}>Phase 2 — Anchor</p>
              <p style={styles.phaseSub}>The Universal Truth</p>
            </div>
            <div style={styles.anchorMeta}>
              <span style={styles.anchorRiverTag}>{diagnosis.riverData.name}</span>
              <span style={styles.anchorQuality}>{diagnosis.riverData.quality}</span>
            </div>
            <div style={styles.anchorBox}>
              {diagnosis.riverData.anchor.split("\n").filter(Boolean).map((para, i) => (
                <p key={i} style={styles.anchorPara}>{para}</p>
              ))}
            </div>
            <button onClick={() => setPhase("RIGHTS")} style={styles.continueBtn}>Continue to Claim Rights →</button>
          </div>
        )}

        {/* ── RIGHTS PHASE ── */}
        {phase === "RIGHTS" && diagnosis && (
          <div style={wrapperStyle}>
            <div style={styles.phaseHeader}>
              <p style={styles.phaseLabel}>Phase 3 — Claim Rights</p>
              <p style={styles.phaseSub}>{RIGHTS[diagnosis.domain].title}</p>
            </div>
            <div style={styles.rightsBox}>
              {RIGHTS[diagnosis.domain].text.split("\n").filter(Boolean).map((para, i) => (
                <p key={i} style={styles.rightsPara}>{para}</p>
              ))}
            </div>
            <button onClick={() => setPhase("TREATMENT")} style={styles.continueBtn}>Continue to Treatment →</button>
          </div>
        )}

        {/* ── TREATMENT PHASE ── */}
        {phase === "TREATMENT" && (
          <div style={wrapperStyle}>
            <div style={styles.phaseHeader}>
              <p style={styles.phaseLabel}>Phase 4 — Annihilate</p>
              <p style={styles.phaseSub}>Specific Treatment</p>
            </div>
            {treatLoading || !treatment ? (
              <div style={{ textAlign: 'center', padding: '60px 0' }}>
                <div style={{ fontSize: 28, color: '#b09a5f', marginBottom: 20 }}>◉</div>
                <p style={{ ...styles.dimText, fontStyle: 'italic', fontSize: 16 }}>Diagnosing the specific error claims...</p>
                <p style={{ ...styles.dimText, fontSize: 13, marginTop: 12 }}>Tracing root beliefs. Preparing treatment.</p>
                <p style={{ ...styles.dimText, fontSize: 12, marginTop: 20, color: '#4a4a40' }}>This takes a few moments — the treatment is being generated with precision for your exact situation.</p>
              </div>
            ) : (
              <>
                <p style={styles.treatInstruction}>Read each section aloud — or mentally, with focused attention.</p>

                {treatment.errorAnalysis && (
                  <div style={{ marginBottom: 20 }}>
                    <p style={styles.sectionLabel}>Error Analysis</p>
                    <div style={styles.analysisBox}>
                      <p style={styles.analysisText}>{treatment.errorAnalysis}</p>
                    </div>
                  </div>
                )}

                {treatment.rootClaim && (
                  <div style={{ marginBottom: 20 }}>
                    <p style={styles.sectionLabel}>Root Claim</p>
                    <div style={{ ...styles.analysisBox, borderColor: '#4a3020' }}>
                      <p style={{ ...styles.analysisText, color: '#c4a35a' }}>{treatment.rootClaim}</p>
                    </div>
                  </div>
                )}

                {treatment.theTruth && (
                  <div style={{ marginBottom: 20 }}>
                    <p style={styles.sectionLabel}>The Truth</p>
                    <div style={{ ...styles.analysisBox, borderColor: '#2a3a28' }}>
                      <p style={{ ...styles.analysisText, color: '#a0b890' }}>{treatment.theTruth}</p>
                    </div>
                  </div>
                )}

                {treatment.treatment && (
                  <div style={{ marginBottom: 20 }}>
                    <p style={{ ...styles.sectionLabel, color: '#c4a35a' }}>Treatment — Speak This</p>
                    <div style={styles.treatmentBox}>
                      {treatment.treatment.split("\n").filter(Boolean).map((line, i) => (
                        <p key={i} style={styles.treatmentText}>{line}</p>
                      ))}
                    </div>
                  </div>
                )}

                {treatment.watch && (
                  <div style={{ marginBottom: 28 }}>
                    <p style={styles.sectionLabel}>Watch</p>
                    <div style={{ ...styles.analysisBox, borderColor: '#3a2a2a', background: '#1a1614' }}>
                      <p style={{ ...styles.analysisText, color: '#a08070', fontStyle: 'italic' }}>{treatment.watch}</p>
                    </div>
                  </div>
                )}

                {treatment.scientificNow && retroMode && (
                  <div style={{ marginBottom: 28 }}>
                    <p style={{ ...styles.sectionLabel, color: '#a090d0' }}>The Scientific "Now"</p>
                    <div style={{ ...styles.analysisBox, borderColor: '#3a3050', background: '#16141a' }}>
                      <p style={{ ...styles.analysisText, color: '#b0a8c8' }}>{treatment.scientificNow}</p>
                    </div>
                    <div style={{ marginTop: 12 }}>
                      <div style={styles.retroBadgeBox}>
                        <span style={styles.retroBadgeIcon}>⟲</span>
                        <span style={styles.retroBadgeText}>Treatment applied at: {retroWhen}</span>
                      </div>
                    </div>
                  </div>
                )}

                {/* Fallback: if no sections parsed but we have raw text */}
                {!treatment.errorAnalysis && !treatment.treatment && !treatment.theTruth && treatment.full && (
                  <div style={{ marginBottom: 20 }}>
                    <p style={{ ...styles.sectionLabel, color: '#c4a35a' }}>Treatment</p>
                    <div style={styles.treatmentBox}>
                      {treatment.full.split("\n").filter(Boolean).map((line, i) => (
                        <p key={i} style={styles.treatmentText}>{line}</p>
                      ))}
                    </div>
                  </div>
                )}

                <button onClick={() => setPhase("PILLARS")} style={styles.spokenBtn}>I have spoken this aloud</button>
              </>
            )}
          </div>
        )}

        {/* ── PILLARS PHASE ── */}
        {phase === "PILLARS" && (
          <div style={wrapperStyle}>
            <div style={styles.phaseHeader}>
              <p style={styles.phaseLabel}>Phase 5 — The Three Pillars</p>
              <p style={styles.phaseSub}>Soul · Truth · Love</p>
            </div>
            <div style={styles.pillarCard}>
              <p style={styles.pillarEmoji}>♡</p>
              <p style={styles.pillarQ}>LOVE — Can you see the face of God in this situation, and in all who are involved?</p>
              <div style={styles.pillarBtns}>
                <button onClick={() => setPillars(p => ({...p, love: true}))} style={{...styles.pillarBtn, background: pillars.love === true ? "#5a6b4a" : "#2a2a2a"}}>Yes</button>
                <button onClick={() => setPillars(p => ({...p, love: false}))} style={{...styles.pillarBtn, background: pillars.love === false ? "#6b4a4a" : "#2a2a2a"}}>Not Yet</button>
              </div>
            </div>
            <div style={styles.pillarCard}>
              <p style={styles.pillarEmoji}>◈</p>
              <p style={styles.pillarQ}>TRUTH — Is there any truth to the claim that {treatment?.rootClaim || "the error is making about you"}?</p>
              <div style={styles.pillarBtns}>
                <button onClick={() => setPillars(p => ({...p, truth: true}))} style={{...styles.pillarBtn, background: pillars.truth === true ? "#5a6b4a" : "#2a2a2a"}}>No — it is a lie</button>
                <button onClick={() => setPillars(p => ({...p, truth: false}))} style={{...styles.pillarBtn, background: pillars.truth === false ? "#6b4a4a" : "#2a2a2a"}}>Not Yet Clear</button>
              </div>
            </div>
            <div style={styles.pillarCard}>
              <p style={styles.pillarEmoji}>⊙</p>
              <p style={styles.pillarQ}>SOUL — Can you feel the wholeness of Soul right now — before the evidence appears?</p>
              <div style={styles.pillarBtns}>
                <button onClick={() => setPillars(p => ({...p, soul: true}))} style={{...styles.pillarBtn, background: pillars.soul === true ? "#5a6b4a" : "#2a2a2a"}}>Yes</button>
                <button onClick={() => setPillars(p => ({...p, soul: false}))} style={{...styles.pillarBtn, background: pillars.soul === false ? "#6b4a4a" : "#2a2a2a"}}>Not Yet</button>
              </div>
            </div>
            {(pillars.love === false || pillars.truth === false || pillars.soul === false) && (
              <div style={styles.notYetBox}>
                <p style={styles.notYetText}>
                  This is normal. The lie has seemed real for a long time. Return to the Universal Truth and sit with it until the "Yes" arises naturally. You cannot force Love. You can only make space for it.
                </p>
              </div>
            )}
            {(pillars.love !== null && pillars.truth !== null && pillars.soul !== null) && (
              <button onClick={handleComplete} style={styles.continueBtn}>
                {pillars.love && pillars.truth && pillars.soul ? "Complete Treatment →" : "Record & Close →"}
              </button>
            )}
          </div>
        )}

        {/* ── COMPLETE PHASE ── */}
        {phase === "COMPLETE" && (
          <div style={wrapperStyle}>
            <div style={styles.completeArea}>
              {pillars.love && pillars.truth && pillars.soul ? (
                <>
                  <div style={styles.completeMark}><img src={KF_LOGO} alt="KF" style={{ width: 56, height: 56, objectFit: 'contain', borderRadius: 8 }} /></div>
                  <h2 style={styles.completeTitle}>Treatment Complete</h2>
                  <p style={styles.completeText}>The demonstration is in motion.</p>
                  {retroMode ? (
                    <p style={styles.completeVerse}>
                      "That which hath been is now; and that which is to be hath already been." The bridge of coincidence is dissolved at its origin.
                    </p>
                  ) : (
                    <p style={styles.completeVerse}>
                      "Divine Love always has met and always will meet every human need."
                    </p>
                  )}
                </>
              ) : (
                <>
                  <div style={styles.completeMark}><img src={KF_LOGO} alt="KF" style={{ width: 56, height: 56, objectFit: 'contain', borderRadius: 8 }} /></div>
                  <h2 style={styles.completeTitle}>Treatment Recorded</h2>
                  <p style={styles.completeText}>
                    The seed is planted. Return when you are ready. Truth does not require your perfection — only your willingness.
                  </p>
                </>
              )}
              <button onClick={downloadCurrentTreatment} style={styles.downloadCompleteBtn}>↓ Download Treatment (.txt)</button>
              <button onClick={reset} style={styles.treatBtn}>Return</button>
            </div>
          </div>
        )}
      </div>

      {/* ── BOTTOM BAR ── */}
      {phase !== "COMPLETE" && (
        <div style={styles.bottomBar}>
          {phase !== "INPUT" && (
            <button onClick={reset} style={styles.bottomBackBtn}>← Start Over</button>
          )}
          <div style={{ flex: 1 }} />
          <button onClick={() => setShowEmergency(true)} style={styles.emergencyBtn}>EMERGENCY</button>
        </div>
      )}
    </div>
  );
}
