    function diagnose(input) {
      const lower = input.toLowerCase();
      let scores = { BODY: 0, MIND: 0, PURSE: 0, HEART: 0 };
      let matched = {};

      for (const [domain, data] of Object.entries(DOMAINS)) {
        for (const kw of data.keywords) {
          if (lower.includes(kw)) {
            scores[domain] += kw.includes(" ") ? 3 : 1;
            if (!matched[domain]) matched[domain] = [];
            matched[domain].push(kw);
          }
        }
      }

      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const primary = sorted[0][1] > 0 ? sorted[0][0] : "MIND";
      const domainData = DOMAINS[primary];

      let useSecondary = false;
      if (domainData.secondaryTriggers) {
        for (const t of domainData.secondaryTriggers) {
          if (lower.includes(t)) { useSecondary = true; break; }
        }
      }

      const river = useSecondary ? domainData.secondaryRiver : domainData.primaryRiver;

      return {
        domain: primary,
        domainLabel: domainData.label,
        river,
        riverData: RIVERS[river],
        matchedKeywords: matched[primary] || [],
        input
      };
    }

    async function hashPassword(pw) {
      const encoder = new TextEncoder();
      const data = encoder.encode(pw);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function BreathingTimer({ onComplete }) {
      const [state, setState] = useState("ready");
      const [breathCount, setBreathCount] = useState(0);
      const [seconds, setSeconds] = useState(0);
      const [breathPhase, setBreathPhase] = useState("in");

      useEffect(() => {
        if (state !== "breathing") return;
        const interval = setInterval(() => {
          setSeconds(s => {
            const next = s + 1;
            if (breathPhase === "in" && next >= 4) {
              setBreathPhase("hold");
              return 0;
            }
            if (breathPhase === "hold" && next >= 4) {
              setBreathPhase("out");
              return 0;
            }
            if (breathPhase === "out" && next >= 6) {
              const newCount = breathCount + 1;
              if (newCount >= 3) {
                setState("done");
                return 0;
              } else {
                setBreathCount(newCount);
                setBreathPhase("in");
                return 0;
              }
            }
            return next;
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [state, breathPhase, breathCount]);

      const phaseLabels = { in: "Breathe In", hold: "Hold", out: "Breathe Out" };
      const phaseDurations = { in: 4, hold: 4, out: 6 };

      const scale = breathPhase === "in" ? 1.2 : breathPhase === "hold" ? 1.2 : 0.8;

      if (state === "ready") {
        return (
          <div style={styles.breathCircleOuter}>
            <div style={{ ...styles.breathCircleInner, transform: "scale(1)" }}>
              <div style={styles.breathLabel}>Ready</div>
            </div>
            <button style={styles.breathBtn} onClick={() => setState("breathing")}>Begin</button>
          </div>
        );
      }

      if (state === "done") {
        return (
          <div style={styles.breathCircleOuter}>
            <div style={{ ...styles.breathCircleInner, transform: "scale(1)" }}>
              <div style={styles.breathLabel}>Complete</div>
            </div>
            <button style={styles.breathBtn} onClick={onComplete}>Continue</button>
          </div>
        );
      }

      return (
        <div style={styles.breathCircleOuter}>
          <div style={{ ...styles.breathCircleInner, transform: `scale(${scale})`, transition: "transform 1s ease-in-out" }}>
            <div style={styles.breathLabel}>{phaseLabels[breathPhase]}</div>
            <div style={styles.breathSeconds}>{phaseDurations[breathPhase] - seconds}</div>
          </div>
        </div>
      );
    }

        URL.revokeObjectURL(url);

${entry.input}

${entry.treatment.errorAnalysis ? `ERROR ANALYSIS:\n${entry.treatment.errorAnalysis}\n\n` : ""}${entry.treatment.rootClaim ? `ROOT CLAIM:\n${entry.treatment.rootClaim}\n\n` : ""}${entry.treatment.theTruth ? `THE TRUTH:\n${entry.treatment.theTruth}\n\n` : ""}TREATMENT:
${entry.treatment.treatment}

${entry.treatment.watch ? `WATCH:\n${entry.treatment.watch}\n\n` : ""}${entry.treatment.scientificNow ? `THE SCIENTIFIC NOW:\n${entry.treatment.scientificNow}\n\n` : ""}`;

${diagnosis.input}
